<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TX - fluxi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        /* --- Code screen --- */
        #codeScreen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #0a0a0a;
        }
        #codeScreen.hidden { display: none; }
        .code-box {
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .code-box .lock {
            font-size: 3.5rem;
            margin-bottom: 15px;
        }
        .code-box h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .code-box p {
            color: #555;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }
        .code-box input {
            background: #111;
            border: 1px solid #222;
            border-radius: 14px;
            padding: 16px 22px;
            color: #fff;
            font-size: 1.5rem;
            font-family: inherit;
            text-align: center;
            letter-spacing: 8px;
            width: 200px;
            outline: none;
            transition: border-color 0.3s;
        }
        .code-box input:focus { border-color: #667eea; }
        .code-box .code-err {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 12px;
            display: none;
        }
        .code-box .code-err.show { display: block; }
        .code-box .btn {
            display: block;
            margin: 18px auto 0;
            padding: 14px 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .code-box .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        /* --- Chat layout --- */
        #chatScreen { display: none; height: 100vh; }
        #chatScreen.show { display: flex; }
        .sidebar {
            width: 220px;
            background: #0d0d0d;
            border-right: 1px solid #141414;
            display: flex;
            flex-direction: column;
            padding: 20px 12px;
            flex-shrink: 0;
        }
        .sidebar .title {
            font-size: 1.2rem;
            font-weight: 700;
            padding: 0 10px 20px;
            letter-spacing: -0.5px;
        }
        .sidebar .title span {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sidebar .channel {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 10px;
            color: #666;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }
        .sidebar .channel:hover { background: rgba(102, 126, 234, 0.15); }
        .sidebar .channel .hash { color: #667eea; font-weight: 700; }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .main .header {
            padding: 18px 24px;
            border-bottom: 1px solid #141414;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .main .header .hash {
            color: #666;
            font-size: 1.3rem;
            font-weight: 700;
        }
        .main .header h3 {
            font-size: 1rem;
            font-weight: 600;
        }
        .main .header .topic {
            color: #555;
            font-size: 0.8rem;
            margin-left: 15px;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }
        .messages .empty {
            text-align: center;
            color: #333;
            padding: 60px 0;
            font-size: 0.9rem;
        }
        .msg {
            display: flex;
            gap: 14px;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease-out;
        }
        .msg .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .msg .body .name {
            font-size: 0.85rem;
            font-weight: 600;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .msg .body .name .time {
            color: #444;
            font-weight: 400;
            font-size: 0.75rem;
        }
        .msg .body .text {
            color: #ccc;
            font-size: 0.95rem;
            margin-top: 2px;
            word-break: break-word;
        }
        .input-area {
            padding: 16px 24px 20px;
            border-top: 1px solid #141414;
        }
        .input-area .row {
            display: flex;
            gap: 12px;
        }
        .input-area input {
            flex: 1;
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 14px 18px;
            color: #fff;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-area input:focus { border-color: #667eea; }
        .input-area .send-btn {
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
        }
        .input-area .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.25);
        }
        .input-area .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Scrollbar */
        .messages::-webkit-scrollbar { width: 6px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }

        @media (max-width: 600px) {
            .sidebar { width: 60px; padding: 20px 8px; }
            .sidebar .title { display: none; }
            .sidebar .channel span:not(.hash) { display: none; }
            .main .header .topic { display: none; }
            .input-area .row { flex-direction: column; }
        }
    </style>
</head>
<body>

<!-- Code screen -->
<div id="codeScreen">
    <div class="code-box">
        <div class="lock">&#x1F512;</div>
        <h2>Access code required</h2>
        <p>Enter the code to view this page.</p>
        <input type="password" id="codeInput" maxlength="4" inputmode="numeric" autocomplete="off" onkeydown="if(event.key==='Enter')checkCode()">
        <div class="code-err" id="codeErr">Wrong code. Try again.</div>
        <button class="btn" onclick="checkCode()">Unlock</button>
    </div>
</div>

<!-- Chat screen -->
<div id="chatScreen">
    <div class="sidebar">
        <div class="title"><span>TX</span></div>
        <div class="channel">
            <span class="hash">#</span>
            <span>&Aacute;ltal&aacute;nos</span>
        </div>
    </div>
    <div class="main">
        <div class="header">
            <span class="hash">#</span>
            <h3>&Aacute;ltal&aacute;nos</h3>
            <span class="topic">Mindenki &aacute;ltal&aacute;nos besz&eacute;lget&eacute;se</span>
        </div>
        <div class="messages" id="msgContainer">
            <div class="empty" id="emptyMsg">Nincsenek &uuml;zenetek. &Iacuterj valamit!</div>
        </div>
        <div class="input-area">
            <div class="row">
                <input type="text" id="msgInput" placeholder="&Iacuterj &uuml;zenetet..." onkeydown="if(event.key==='Enter')sendMsg()">
                <button class="send-btn" id="sendBtn" onclick="sendMsg()">K&uuml;ld&eacute;s</button>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
    // === Firebase config ===
    // TODO: Replace with your own Firebase project config.
    // 1. Go to https://console.firebase.google.com/
    // 2. Create a project (or use existing)
    // 3. Enable Firestore Database (start in test mode)
    // 4. Register a web app and copy the config below
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    let db = null;
    let allMessages = [];
    let unsubscribe = null;

    function initFirebase() {
        if (firebaseConfig.apiKey === "YOUR_API_KEY") {
            // Show a message if not configured
            document.getElementById('emptyMsg').textContent = 'Firebase nincs beallitva. Allitsd be a firebaseConfig-ot!';
            return;
        }
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            listenMessages();
        } catch (e) {
            document.getElementById('emptyMsg').textContent = 'Firebase hiba: ' + e.message;
        }
    }

    function listenMessages() {
        if (unsubscribe) unsubscribe();
        unsubscribe = db.collection("messages")
            .orderBy("time")
            .onSnapshot((snapshot) => {
                allMessages = [];
                snapshot.forEach((doc) => {
                    allMessages.push({ id: doc.id, ...doc.data() });
                });
                renderMessages();
            }, (error) => {
                document.getElementById('emptyMsg').textContent = 'Hiba: ' + error.message;
            });
    }

    function renderMessages() {
        const container = document.getElementById('msgContainer');
        const empty = document.getElementById('emptyMsg');
        if (allMessages.length === 0) {
            empty.style.display = 'block';
            // Remove all .msg elements
            container.querySelectorAll('.msg').forEach(el => el.remove());
            return;
        }
        empty.style.display = 'none';

        // Remove old msgs
        container.querySelectorAll('.msg').forEach(el => el.remove());

        allMessages.forEach((msg, i) => {
            const div = document.createElement('div');
            div.className = 'msg';

            const name = msg.name || 'Anonymous';
            const initial = name.charAt(0).toUpperCase();

            const date = msg.time ? new Date(msg.time.seconds * 1000) : new Date();
            const dateStr = date.toLocaleDateString('hu-HU', {
                year: 'numeric', month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });

            div.innerHTML = `
                <div class="avatar">${initial}</div>
                <div class="body">
                    <div class="name">${escapeHtml(name)} <span class="time">${dateStr}</span></div>
                    <div class="text">${escapeHtml(msg.text || '')}</div>
                </div>
            `;
            container.appendChild(div);
        });

        // Scroll to bottom
        container.scrollTop = container.scrollHeight;
    }

    function sendMsg() {
        const input = document.getElementById('msgInput');
        const btn = document.getElementById('sendBtn');
        const text = input.value.trim();
        if (!text || !db) return;

        btn.disabled = true;
        db.collection("messages").add({
            name: "Anonymous",
            text: text,
            time: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            input.value = '';
            btn.disabled = false;
        }).catch((err) => {
            alert('Hiba: ' + err.message);
            btn.disabled = false;
        });
    }

    function escapeHtml(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    // === Code check ===
    function checkCode() {
        const input = document.getElementById('codeInput');
        const err = document.getElementById('codeErr');
        if (input.value === '7308') {
            document.getElementById('codeScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.add('show');
            initFirebase();
        } else {
            err.classList.add('show');
            input.value = '';
            input.focus();
        }
    }
</script>
</body>
</html>
