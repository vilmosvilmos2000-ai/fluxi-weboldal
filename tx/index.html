<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TX - fluxi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        .screen { display: none; height: 100vh; }
        .screen.show { display: flex; justify-content: center; align-items: center; }
        .box {
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .box .icon { font-size: 3.5rem; margin-bottom: 15px; }
        .box h2 {
            font-size: 1.5rem; font-weight: 700; margin-bottom: 6px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .box p { color: #555; font-size: 0.9rem; margin-bottom: 25px; }
        .box input {
            background: #111; border: 1px solid #222; border-radius: 14px;
            padding: 16px 22px; color: #fff; font-size: 1.5rem;
            font-family: inherit; text-align: center; letter-spacing: 8px;
            width: 200px; outline: none; transition: border-color 0.3s;
        }
        .box input:focus { border-color: #667eea; }
        .box input.text-input {
            font-size: 1.1rem; letter-spacing: 0; width: 280px;
        }
        .box .err { color: #e74c3c; font-size: 0.85rem; margin-top: 12px; display: none; }
        .box .err.show { display: block; }
        .box .btn {
            display: block; margin: 18px auto 0; padding: 14px 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none; border-radius: 12px; color: #fff;
            font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s;
        }
        .box .btn:hover {
            transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102,126,234,0.3);
        }

        /* Chat layout */
        #chatScreen { display: none; height: 100vh; }
        #chatScreen.show { display: flex; }
        .sidebar {
            width: 220px; background: #0d0d0d;
            border-right: 1px solid #141414;
            display: flex; flex-direction: column; padding: 20px 12px; flex-shrink: 0;
        }
        .sidebar .title {
            font-size: 1.2rem; font-weight: 700; padding: 0 10px 20px;
            letter-spacing: -0.5px;
        }
        .sidebar .title span {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .sidebar .channel {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; border-radius: 10px; color: #666;
            font-size: 0.9rem; font-weight: 500;
            background: rgba(102,126,234,0.1); color: #667eea;
        }
        .sidebar .channel .hash { color: #667eea; font-weight: 700; }
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .main .header {
            padding: 18px 24px; border-bottom: 1px solid #141414;
            display: flex; align-items: center; gap: 10px;
        }
        .main .header .hash { color: #666; font-size: 1.3rem; font-weight: 700; }
        .main .header h3 { font-size: 1rem; font-weight: 600; }
        .main .header .topic { color: #555; font-size: 0.8rem; margin-left: 15px; }
        .messages {
            flex: 1; overflow-y: auto; padding: 20px 24px;
        }
        .messages .empty {
            text-align: center; color: #333; padding: 60px 0; font-size: 0.9rem;
        }
        .msg {
            display: flex; gap: 14px; margin-bottom: 20px;
            animation: fadeIn 0.3s ease-out;
            position: relative;
        }
        .msg .avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.9rem; flex-shrink: 0;
        }
        .msg .avatar.admin {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }
        .msg .body .name {
            font-size: 0.85rem; font-weight: 600; color: #667eea;
            display: flex; align-items: center; gap: 8px;
        }
        .msg .body .name .admin-badge {
            font-size: 0.65rem; font-weight: 700; color: #e74c3c;
            background: rgba(231,76,60,0.12);
            padding: 2px 8px; border-radius: 6px;
            text-transform: uppercase; letter-spacing: 0.5px;
            animation: glow 1.2s ease-in-out infinite alternate;
            border: 1px solid rgba(231,76,60,0.25);
        }
        @keyframes glow {
            from { box-shadow: 0 0 4px rgba(231,76,60,0.2); }
            to { box-shadow: 0 0 12px rgba(231,76,60,0.6); }
        }
        .msg .body .name .time { color: #444; font-weight: 400; font-size: 0.75rem; }
        .msg .body .text {
            color: #ccc; font-size: 0.95rem; margin-top: 2px; word-break: break-word;
        }
        .msg .del-btn {
            position: absolute; right: 0; top: 0;
            background: none; border: none; color: #333;
            font-size: 0.85rem; cursor: pointer; padding: 4px 8px;
            border-radius: 6px; transition: all 0.2s; display: none;
        }
        .msg .del-btn:hover { color: #e74c3c; background: rgba(231,76,60,0.1); }
        .msg .del-btn.show { display: block; }
        .input-area { padding: 16px 24px 20px; border-top: 1px solid #141414; }
        .input-area .row { display: flex; gap: 12px; }
        .input-area input {
            flex: 1; background: #111; border: 1px solid #222; border-radius: 12px;
            padding: 14px 18px; color: #fff; font-size: 0.95rem;
            font-family: inherit; outline: none; transition: border-color 0.3s;
        }
        .input-area input:focus { border-color: #667eea; }
        .input-area .send-btn {
            padding: 14px 24px; background: linear-gradient(135deg, #667eea, #764ba2);
            border: none; border-radius: 12px; color: #fff; font-weight: 600;
            font-size: 0.95rem; cursor: pointer; transition: all 0.3s; flex-shrink: 0;
        }
        .input-area .send-btn:hover {
            transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102,126,234,0.25);
        }
        .input-area .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .messages::-webkit-scrollbar { width: 6px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }
        @media (max-width: 600px) {
            .sidebar { width: 60px; padding: 20px 8px; }
            .sidebar .title { display: none; }
            .sidebar .channel span:not(.hash) { display: none; }
            .main .header .topic { display: none; }
        }
    </style>
</head>
<body>

<!-- Code screen -->
<div id="codeScreen" class="screen show">
    <div class="box">
        <div class="lock">&#x1F512;</div>
        <h2>Access code required</h2>
        <p>Enter the code to view this page.</p>
        <input type="password" id="codeInput" maxlength="4" inputmode="numeric" autocomplete="off" onkeydown="if(event.key==='Enter')checkCode()">
        <div class="err" id="codeErr">Wrong code. Try again.</div>
        <button class="btn" onclick="checkCode()">Unlock</button>
    </div>
</div>

<!-- Name screen -->
<div id="nameScreen" class="screen">
    <div class="box">
        <div class="icon">&#x1F464;</div>
        <h2>What is your name?</h2>
        <p>This will be shown on your messages.</p>
        <input type="text" id="nameInput" class="text-input" placeholder="Enter your name..." maxlength="20" onkeydown="if(event.key==='Enter')setName()">
        <div class="err" id="nameErr">Please enter a name.</div>
        <button class="btn" onclick="setName()">Continue</button>
    </div>
</div>

<!-- Chat screen -->
<div id="chatScreen">
    <div class="sidebar">
        <div class="title"><span>TX</span></div>
        <div class="channel">
            <span class="hash">#</span>
            <span>&Aacute;ltal&aacute;nos</span>
        </div>
    </div>
    <div class="main">
        <div class="header">
            <span class="hash">#</span>
            <h3>&Aacute;ltal&aacute;nos</h3>
            <span class="topic">Mindenki &aacute;ltal&aacute;nos besz&eacute;lget&eacute;se</span>
        </div>
        <div class="messages" id="msgContainer">
            <div class="empty" id="emptyMsg">Nincsenek &uuml;zenetek. &Iacuterj valamit!</div>
        </div>
        <div class="input-area">
            <div class="row">
                <input type="text" id="msgInput" placeholder="&Iacuterj &uuml;zenetet..." onkeydown="if(event.key==='Enter')sendMsg()">
                <button class="send-btn" id="sendBtn" onclick="sendMsg()">K&uuml;ld&eacute;s</button>
            </div>
        </div>
    </div>
</div>

<script>
    const GH_TOKEN = "ghp_" + "YnynRCsd5dUGIBhE7e8H4QBC7eFy3Q3Il0G1";
    const GH_OWNER = "vilmosvilmos2000-ai";
    const GH_REPO = "fluxi-weboldal";
    const GH_PATH = "tx/messages.json";
    const GH_URL = "https://api.github.com/repos/" + GH_OWNER + "/" + GH_REPO + "/contents/" + GH_PATH;

    let messages = [];
    let currentSha = null;
    let pollTimer = null;
    let isAdmin = false;
    let userName = "";

    function escapeHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function fmtDate(ts) {
        const d = new Date(ts);
        return d.getFullYear() + "." +
            String(d.getMonth()+1).padStart(2,'0') + "." +
            String(d.getDate()).padStart(2,'0') + " " +
            String(d.getHours()).padStart(2,'0') + ":" +
            String(d.getMinutes()).padStart(2,'0');
    }

    function renderMessages() {
        const container = document.getElementById('msgContainer');
        const empty = document.getElementById('emptyMsg');
        container.querySelectorAll('.msg').forEach(el => el.remove());
        if (messages.length === 0) {
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';
        messages.forEach((msg, idx) => {
            const div = document.createElement('div');
            div.className = 'msg';
            const name = msg.n || "Anonymous";
            const initial = name.charAt(0).toUpperCase();
            const isMsgAdmin = msg.a === true;
            const avatarClass = isMsgAdmin ? 'avatar admin' : 'avatar';
            const adminBadge = isMsgAdmin ? '<span class="admin-badge">admin</span>' : '';
            const delBtn = isAdmin ? '<button class="del-btn show" onclick="deleteMsg(' + idx + ')">&#x2716;</button>' : '';

            div.innerHTML = '<div class="' + avatarClass + '">' + initial + '</div>'
                + '<div class="body">'
                + '<div class="name">' + escapeHtml(name) + adminBadge + ' <span class="time">' + fmtDate(msg.t) + '</span></div>'
                + '<div class="text">' + escapeHtml(msg.m) + '</div>'
                + '</div>'
                + delBtn;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }

    function utf8ToBase64(str) {
        const encoder = new TextEncoder();
        const bytes = encoder.encode(str);
        let binary = '';
        for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
        return btoa(binary);
    }

    function base64ToUtf8(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        return new TextDecoder().decode(bytes);
    }

    async function loadMessages() {
        try {
            const res = await fetch(GH_URL, {
                headers: { Authorization: "Bearer " + GH_TOKEN }
            });
            if (res.status === 404) { messages = []; renderMessages(); return; }
            const data = await res.json();
            currentSha = data.sha;
            const raw = base64ToUtf8(data.content);
            messages = JSON.parse(raw);
            if (!Array.isArray(messages)) messages = [];
            renderMessages();
        } catch (e) { console.error("load error", e); }
    }

    async function saveMessages() {
        const content = utf8ToBase64(JSON.stringify(messages));
        const body = { message: "update messages", content: content };
        if (currentSha) body.sha = currentSha;
        try {
            const res = await fetch(GH_URL, {
                method: "PUT",
                headers: { Authorization: "Bearer " + GH_TOKEN, "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            if (data.content) currentSha = data.content.sha;
            return true;
        } catch (e) { console.error("save error", e); return false; }
    }

    async function sendMsg() {
        const input = document.getElementById('msgInput');
        const btn = document.getElementById('sendBtn');
        const text = input.value.trim();
        if (!text) return;
        btn.disabled = true;
        messages.push({ n: userName, m: text, t: Date.now(), a: isAdmin });
        renderMessages();
        input.value = '';
        const ok = await saveMessages();
        if (!ok) { messages.pop(); renderMessages(); alert("Hiba a mentes soran."); }
        btn.disabled = false;
    }

    async function deleteMsg(index) {
        if (!isAdmin) return;
        messages.splice(index, 1);
        renderMessages();
        await saveMessages();
    }

    function startPolling() {
        if (pollTimer) clearInterval(pollTimer);
        pollTimer = setInterval(async () => {
            try {
                const res = await fetch(GH_URL, {
                    headers: { Authorization: "Bearer " + GH_TOKEN }
                });
                if (res.status === 404) return;
                const data = await res.json();
                const raw = base64ToUtf8(data.content);
                const fresh = JSON.parse(raw);
                if (!Array.isArray(fresh)) return;
                if (JSON.stringify(fresh) !== JSON.stringify(messages)) {
                    messages = fresh;
                    currentSha = data.sha;
                    renderMessages();
                }
            } catch (e) { /* ignore */ }
        }, 5000);
    }

    function checkCode() {
        const input = document.getElementById('codeInput');
        const err = document.getElementById('codeErr');
        const code = input.value;
        if (code === '7308' || code === '1967') {
            isAdmin = (code === '1967');
            const saved = localStorage.getItem('tx_name');
            if (saved) {
                userName = saved;
                document.getElementById('codeScreen').classList.remove('show');
                document.getElementById('chatScreen').classList.add('show');
                loadMessages();
                startPolling();
            } else {
                document.getElementById('codeScreen').classList.remove('show');
                document.getElementById('nameScreen').classList.add('show');
            }
        } else {
            err.classList.add('show');
            input.value = '';
            input.focus();
        }
    }

    function setName() {
        const input = document.getElementById('nameInput');
        const err = document.getElementById('nameErr');
        const name = input.value.trim();
        if (!name) { err.classList.add('show'); return; }
        err.classList.remove('show');
        userName = name;
        localStorage.setItem('tx_name', name);
        document.getElementById('nameScreen').classList.remove('show');
        document.getElementById('chatScreen').classList.add('show');
        loadMessages();
        startPolling();
    }
</script>
</body>
</html>
