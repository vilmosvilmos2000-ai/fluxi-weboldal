<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>shout learn[BETA]</title>
    <style>
        :root {
            --ch-color: #00ff00;
            --ch-size: 20px;
            --ch-thickness: 2px;
            --ch-gap: 5px;
        }
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; user-select: none; }
        
        /* Célkereszt */
        #crosshair-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: var(--ch-size); height: var(--ch-size);
            pointer-events: none;
        }
        .ch-line {
            position: absolute; background: var(--ch-color);
        }
        .v-line { width: var(--ch-thickness); height: 100%; left: 50%; transform: translateX(-50%); }
        .h-line { width: 100%; height: var(--ch-thickness); top: 50%; transform: translateY(-50%); }
        .ch-gap-mask {
            position: absolute; top: 50%; left: 50%;
            width: var(--ch-gap); height: var(--ch-gap);
            background: transparent; transform: translate(-50%, -50%);
        }

        /* HUD */
        #hud {
            position: absolute; bottom: 20px; left: 20px;
            color: white; background: rgba(0,0,0,0.6);
            padding: 15px; border-left: 5px solid #00bcff;
        }
        #weapon-info { position: absolute; bottom: 20px; right: 20px; color: #00bcff; font-size: 24px; font-weight: bold; }

        /* Settings Menü */
        #settings-panel {
            position: absolute; top: 50%; right: 20px;
            transform: translateY(-50%);
            background: rgba(15, 15, 25, 0.9);
            color: white; padding: 20px; border-radius: 10px;
            display: none; border: 1px solid #333;
        }
        .setting-item { margin-bottom: 10px; }
        input[type="range"] { width: 100%; }

        #instructions {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="instructions">
        <h1>Shout Learn</h1>
        <p>Kattints a kezdéshez!</p>
        <p><b>ESC</b>: Menü/Beállítások | <b>1, 2, 3</b>: Fegyverváltás</p>
    </div>

    <div id="crosshair-container">
        <div class="ch-line v-line"></div>
        <div class="ch-line h-line"></div>
    </div>

    <div id="hud">
        <div>HP: <span id="hp">100</span></div>
        <div>PONT: <span id="score">0</span></div>
    </div>

    <div id="weapon-info">PISTOL</div>

    <div id="settings-panel">
        <h3>Célkereszt Beállítások</h3>
        <div class="setting-item">
            Szín: <input type="color" id="chColor" value="#00ff00">
        </div>
        <div class="setting-item">
            Méret: <input type="range" id="chSize" min="5" max="50" value="20">
        </div>
        <div class="setting-item">
            Vastagság: <input type="range" id="chThick" min="1" max="10" value="2">
        </div>
        <button onclick="document.body.requestPointerLock()">Vissza a játékba</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Játék Változók ---
        let score = 0, hp = 100, isLocked = false;
        const weapons = {
            1: { name: "PISTOL", color: 0x555555, fireRate: 400, damage: 1 },
            2: { name: "RIFLE", color: 0x222222, fireRate: 100, damage: 0.5 },
            3: { name: "SNIPER", color: 0x000000, fireRate: 1000, damage: 5 }
        };
        let currentWep = weapons[1];
        let canShoot = true;

        // --- Three.js Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Fények
        const ambient = new THREE.AmbientLight(0xffffff, 0.5); scene.add(ambient);
        const pointLight = new THREE.PointLight(0x00bcff, 1); scene.add(pointLight);

        // Pálya
        const grid = new THREE.GridHelper(100, 50, 0x00bcff, 0x222222);
        scene.add(grid);

        // Fegyver Model (Egyszerű blokk)
        const gunGeo = new THREE.BoxGeometry(0.15, 0.2, 0.7);
        const gunMat = new THREE.MeshStandardMaterial({ color: currentWep.color });
        const gunMesh = new THREE.Mesh(gunGeo, gunMat);
        gunMesh.position.set(0.4, -0.4, -0.6);
        camera.add(gunMesh);
        scene.add(camera);

        // --- Botok ---
        const bots = [];
        function spawnBot() {
            const bot = new THREE.Mesh(
                new THREE.BoxGeometry(1.5, 3, 1.5),
                new THREE.MeshStandardMaterial({ color: 0xff0044, emissive: 0xff0000, emissiveIntensity: 0.5 })
            );
            bot.position.set(Math.random()*40-20, 1.5, Math.random()*40-20);
            bot.userData = { hp: 3 };
            scene.add(bot);
            bots.push(bot);
        }
        for(let i=0; i<6; i++) spawnBot();

        // --- Effektek (Szikrák) ---
        function createHitEffect(pos) {
            const particleGeo = new THREE.SphereGeometry(0.05);
            const particleMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            for(let i=0; i<5; i++) {
                const p = new THREE.Mesh(particleGeo, particleMat);
                p.position.copy(pos);
                scene.add(p);
                const dir = new THREE.Vector3(Math.random()-0.5, Math.random(), Math.random()-0.5);
                const ani = setInterval(() => {
                    p.position.addScaledVector(dir, 0.1);
                    p.scale.multiplyScalar(0.9);
                    if(p.scale.x < 0.01) { scene.remove(p); clearInterval(ani); }
                }, 20);
            }
        }

        // --- Beállítások Kezelése ---
        const root = document.documentElement;
        document.getElementById('chColor').addEventListener('input', (e) => root.style.setProperty('--ch-color', e.target.value));
        document.getElementById('chSize').addEventListener('input', (e) => root.style.setProperty('--ch-size', e.target.value + 'px'));
        document.getElementById('chThick').addEventListener('input', (e) => root.style.setProperty('--ch-thickness', e.target.value + 'px'));

        // --- Irányítás & Lövés ---
        document.addEventListener('mousedown', () => { if(isLocked) shoot(); });
        document.addEventListener('keydown', (e) => {
            if(weapons[e.key]) {
                currentWep = weapons[e.key];
                gunMesh.material.color.set(currentWep.color);
                document.getElementById('weapon-info').innerText = currentWep.name;
            }
        });

        const raycaster = new THREE.Raycaster();
        function shoot() {
            if(!canShoot) return;
            canShoot = false;
            setTimeout(() => canShoot = true, currentWep.fireRate);

            // Visszarúgás
            gunMesh.position.z += 0.15;
            setTimeout(() => gunMesh.position.z -= 0.15, 50);

            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const intersects = raycaster.intersectObjects(bots);

            if(intersects.length > 0) {
                const bot = intersects[0].object;
                createHitEffect(intersects[0].point);
                bot.userData.hp -= currentWep.damage;
                if(bot.userData.hp <= 0) {
                    score += 100;
                    document.getElementById('score').innerText = score;
                    bot.position.set(Math.random()*40-20, 1.5, Math.random()*40-20);
                    bot.userData.hp = 3;
                }
            }
        }

        // Lock/Unlock kezelés
        document.addEventListener('pointerlockchange', () => {
            isLocked = document.pointerLockElement === document.body;
            document.getElementById('settings-panel').style.display = isLocked ? 'none' : 'block';
            document.getElementById('instructions').style.display = isLocked ? 'none' : 'flex';
        });

        document.getElementById('instructions').onclick = () => document.body.requestPointerLock();

        // Egér mozgás
        document.addEventListener('mousemove', (e) => {
            if(isLocked) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
            }
        });

        // Mozgás
        const keys = {};
        document.addEventListener('keydown', e => keys[e.code] = true);
        document.addEventListener('keyup', e => keys[e.code] = false);

        function animate() {
            requestAnimationFrame(animate);
            if(isLocked) {
                const speed = 0.12;
                if(keys['KeyW']) camera.translateZ(-speed);
                if(keys['KeyS']) camera.translateZ(speed);
                if(keys['KeyA']) camera.translateX(-speed);
                if(keys['KeyD']) camera.translateX(speed);
                camera.position.y = 1.6;

                bots.forEach(bot => {
                    bot.lookAt(camera.position);
                    bot.translateZ(0.02); // Botok lassan jönnek
                    if(bot.position.distanceTo(camera.position) < 2) {
                        hp -= 0.05;
                        document.getElementById('hp').innerText = Math.floor(hp);
                    }
                });
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
