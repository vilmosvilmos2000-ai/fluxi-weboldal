<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comenius SMP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @font-face {
            font-family: 'Minecraft';
            src: local('Courier New');
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                repeating-linear-gradient(
                    0deg,
                    #3b8c3b 0px, #3b8c3b 2px,
                    #4a9c4a 2px, #4a9c4a 4px
                ),
                repeating-linear-gradient(
                    90deg,
                    #3b8c3b 0px, #3b8c3b 2px,
                    #4a9c4a 2px, #4a9c4a 4px
                );
            z-index: 0;
            image-rendering: pixelated;
        }
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(59, 140, 59, 0.3) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(46, 204, 113, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(39, 174, 96, 0.1) 0%, transparent 50%);
            z-index: 1;
            pointer-events: none;
        }
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            animation: fadeIn 1s ease-out;
            width: 100%;
            max-width: 600px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .mc-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
            filter: drop-shadow(0 0 30px rgba(59, 140, 59, 0.3));
        }
        .server-name {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #4a9c4a, #2ecc71, #27ae60);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }
        .status {
            display: inline-block;
            background: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(17, 17, 17, 0.9);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 50px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #2ecc71, transparent);
        }
        .ip-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .ip-label {
            font-size: 0.85rem;
            color: #666;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .ip-address {
            font-family: 'Courier New', monospace;
            font-size: 1.4rem;
            font-weight: 700;
            color: #2ecc71;
            background: rgba(46, 204, 113, 0.08);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid rgba(46, 204, 113, 0.2);
            letter-spacing: 1px;
        }
        .copy-btn {
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px 20px;
            color: #888;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }
        .copy-btn:hover {
            border-color: #2ecc71;
            color: #2ecc71;
        }
        .copy-btn.copied {
            border-color: #2ecc71;
            color: #2ecc71;
        }
        .players {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid #1a1a1a;
            display: flex;
            justify-content: center;
            gap: 40px;
        }
        .player-stat {
            text-align: center;
        }
        .player-stat .num {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
        }
        .player-stat .label {
            font-size: 0.8rem;
            color: #555;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .footer {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #444;
        }
        .lang-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(17, 17, 17, 0.9);
            border: 1px solid #222;
            border-radius: 12px;
            padding: 10px 18px;
            color: #888;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .lang-btn:hover { border-color: #2ecc71; color: #fff; }
    </style>
</head>
<body>
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>

    <div class="container">
        <span class="mc-icon">⛏️</span>
        <h1 class="server-name">Comenius SMP</h1>
        <div class="status" data-i18n="status">● online</div>

        <div class="card">
            <div class="ip-label" data-i18n="ipLabel">szerver cím</div>
            <div class="ip-box">
                <span class="ip-address">comeniussmp.exaroton.me:13521</span>
                <button class="copy-btn" onclick="copyIP(this)" title="Copy IP">📋</button>
            </div>

            <div class="players">
                <div class="player-stat">
                    <div class="num">⛏️</div>
                    <div class="label" data-i18n="version">1.21</div>
                </div>
                <div class="player-stat">
                    <div class="num">🌿</div>
                    <div class="label" data-i18n="type">Survival</div>
                </div>
                <div class="player-stat">
                    <div class="num">🎮</div>
                    <div class="label" data-i18n="cracked">Cracked</div>
                </div>
            </div>
        </div>

        <div class="footer" data-i18n="footer">Comenius SMP - exaroton</div>
    </div>

    <script>
        const i18n = {
            hu: {
                status: "● online",
                ipLabel: "szerver cím",
                version: "1.21",
                type: "Survival",
                cracked: "Cracked",
                footer: "Comenius SMP - exaroton"
            },
            en: {
                status: "● online",
                ipLabel: "server address",
                version: "1.21",
                type: "Survival",
                cracked: "Cracked",
                footer: "Comenius SMP - exaroton"
            }
        };
        let currentLang = localStorage.getItem('lang') || 'hu';
        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (i18n[lang][key]) el.textContent = i18n[lang][key];
            });
            document.getElementById('langBtn').textContent = lang === 'hu' ? 'EN' : 'HU';
        }
        function toggleLang() { setLang(currentLang === 'hu' ? 'en' : 'hu'); }
        setLang(currentLang);

        function copyIP(btn) {
            navigator.clipboard.writeText('comeniussmp.exaroton.me:13521');
            btn.textContent = '✓';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = '📋';
                btn.classList.remove('copied');
            }, 2000);
        }
    </script>
</body>
</html>
