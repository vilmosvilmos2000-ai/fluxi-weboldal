<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio - fluxi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        .container {
            width: 100%;
            max-width: 560px;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .back {
            display: inline-block;
            color: #444;
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 30px;
            transition: color 0.2s;
        }
        .back:hover { color: #888; }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        h1 span {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sub {
            color: #555;
            font-size: 1rem;
            margin-bottom: 40px;
        }
        .card {
            background: #111;
            border: 1px solid #1a1a1a;
            border-radius: 20px;
            padding: 40px;
        }
        .field {
            margin-bottom: 25px;
        }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #888;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        input, textarea {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 16px 18px;
            color: #fff;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus {
            border-color: #667eea;
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        .rubux-field {
            position: relative;
        }
        .rubux-field input {
            padding-right: 70px;
        }
        .rubux-suffix {
            position: absolute;
            right: 18px;
            bottom: 16px;
            color: #667eea;
            font-weight: 600;
            font-size: 0.9rem;
            pointer-events: none;
        }
        .btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .success {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .success.show { display: block; }
        .success-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        .success h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        .success p { color: #666; }
        .form.hidden { display: none; }
        .error {
            color: #ff4444;
            font-size: 0.85rem;
            margin-top: 6px;
            display: none;
        }
        .error.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back">← vissza</a>
        <h1><span>studio</span></h1>
        <p class="sub">rendelj egyedi programozást</p>

        <div class="card">
            <div class="form" id="form">
                <div class="field">
                    <label>Mit szeretnél, hogy megprogramozzak?</label>
                    <textarea id="project" placeholder="Írd le az ötleted..." required></textarea>
                </div>
                <div class="field">
                    <label>Mennyi rubuxt adsz érte?</label>
                    <div class="rubux-field">
                        <input type="number" id="rubux" placeholder="0" min="0" required>
                        <span class="rubux-suffix">R$</span>
                    </div>
                </div>
                <div class="field">
                    <label>Email címed</label>
                    <input type="email" id="email" placeholder="pelda@email.hu" required>
                    <div class="error" id="emailError">Kérlek érvényes email címet adj meg</div>
                </div>
                <button class="btn" id="submitBtn" onclick="sendOrder()">Küldés</button>
            </div>

            <div class="success" id="success">
                <div class="success-icon">✅</div>
                <h2>Köszönöm!</h2>
                <p>Visszajelzek hamarosan az email címeden.</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        (function() {
            emailjs.init("I3zAazDdXnuEPYiBm");
        })();

        function sendOrder() {
            const project = document.getElementById('project').value.trim();
            const rubux = document.getElementById('rubux').value.trim();
            const email = document.getElementById('email').value.trim();
            const emailError = document.getElementById('emailError');
            const btn = document.getElementById('submitBtn');

            emailError.classList.remove('show');

            if (!email.includes('@') || !email.includes('.')) {
                emailError.classList.add('show');
                return;
            }

            if (!project || !rubux || !email) return;

            btn.disabled = true;
            btn.textContent = 'Küldés...';

            emailjs.send("service_i2ieznq", "template_6c90y9p", {
                name: email,
                project: project,
                rubux: rubux,
                email: email,
                time: new Date().toLocaleString('hu-HU'),
            }).then(() => {
                document.getElementById('form').classList.add('hidden');
                document.getElementById('success').classList.add('show');
            }).catch(() => {
                alert('Hiba történt a küldés során. Próbáld újra.');
                btn.disabled = false;
                btn.textContent = 'Küldés';
            });
        }
    </script>
</body>
</html>
