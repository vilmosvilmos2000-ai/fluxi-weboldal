<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benedek</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            animation: fadeIn 1s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .card {
            background: linear-gradient(145deg, #111, #1a1a1a);
            border: 1px solid #222;
            border-radius: 24px;
            padding: 60px 80px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(102, 126, 234, 0.1), transparent, rgba(118, 75, 162, 0.1), transparent);
            animation: rotate 6s linear infinite;
        }
        @keyframes rotate {
            to { transform: rotate(360deg); }
        }
        .content {
            position: relative;
            z-index: 1;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 auto 25px;
            box-shadow: 0 0 40px rgba(102, 126, 234, 0.3);
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .badge {
            display: inline-block;
            background: rgba(102, 126, 234, 0.15);
            color: #667eea;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 25px;
        }
        p {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.6;
            max-width: 400px;
        }
        .cards {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .emoji-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 20px 25px;
            font-size: 1.8rem;
            transition: all 0.3s ease;
            cursor: default;
        }
        .emoji-card:hover {
            border-color: #667eea;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }
        .float {
            position: absolute;
            font-size: 2rem;
            opacity: 0.1;
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .float:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
        .float:nth-child(2) { bottom: 10%; right: 5%; animation-delay: 1s; }
        .float:nth-child(3) { top: 50%; left: 3%; animation-delay: 2s; }
        .float:nth-child(4) { bottom: 30%; right: 3%; animation-delay: 0.5s; }
    </style>
</head>
<body>
    <span class="float">♠</span>
    <span class="float">♥</span>
    <span class="float">♦</span>
    <span class="float">♣</span>
    <div class="container">
        <div class="card">
            <div class="content">
                <div class="avatar">B</div>
                <h1>Benedek</h1>
                <div class="badge">profi kártyanézõ</div>
                <p>Nézi a kártyáit, és mindegyik szar. Pedig èvek óta gyűjti õket. Mèg mindig vár arra az egy lapra.</p>
                <div class="cards">
                    <div class="emoji-card">🃏</div>
                    <div class="emoji-card">🎴</div>
                    <div class="emoji-card">🃏</div>
                    <div class="emoji-card">🎴</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
