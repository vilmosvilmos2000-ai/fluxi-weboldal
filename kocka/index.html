<!DOCTYPE html>
<html>
<head>
    <title>3D Kocka a VS Code-ból</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; }
        canvas { display: block; }
        #stats {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: #0f0;
            font-family: monospace;
            padding: 15px;
            border: 2px solid #0f0;
            font-size: 12px;
            line-height: 1.6;
            z-index: 100;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 10px;
        }
        #controls button {
            background: #00ffcc;
            color: #000;
            border: none;
            padding: 10px 15px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }
        #controls button:hover {
            background: #ff00ff;
            color: #fff;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div id="stats">
        <div>FPS: <span id="fps">0</span></div>
        <div>Memory: <span id="memory">0</span> MB</div>
        <div>GPU: <span id="gpu">Active</span></div>
        <div>Render: <span id="render">0</span>ms</div>
        <a href="learn.html" class="back-to-hub">← Go to Hub</a>
    </div>
    <div id="loginSection" style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.95); padding: 15px; border: 2px solid #4285f4; z-index: 100; border-radius: 8px; min-width: 280px;">
        <!-- Login Form -->
        <div id="loginForm">
            <h3 style="color: #4285f4; margin: 0 0 15px 0; font-size: 16px;">Login</h3>
            <input type="text" id="loginUser" placeholder="Username" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #4285f4; background: #000; color: #0f0; box-sizing: border-box;">
            <input type="password" id="loginPass" placeholder="Password" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #4285f4; background: #000; color: #0f0; box-sizing: border-box;">
            <button onclick="login()" style="width: 100%; background:#4285f4; color:#fff; border:none; padding:8px; cursor:pointer; border-radius:4px; font-weight:bold; margin-bottom: 10px;">Login</button>
            <button onclick="showSignup()" style="width: 100%; background:#666; color:#fff; border:none; padding:8px; cursor:pointer; border-radius:4px;">Create Account</button>
        </div>
        
        <!-- Signup Form -->
        <div id="signupForm" style="display: none;">
            <h3 style="color: #4285f4; margin: 0 0 15px 0; font-size: 16px;">Create Account</h3>
            <input type="text" id="signupUser" placeholder="Username" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #4285f4; background: #000; color: #0f0; box-sizing: border-box;">
            <input type="password" id="signupPass" placeholder="Password" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #4285f4; background: #000; color: #0f0; box-sizing: border-box;">
            <input type="password" id="signupPass2" placeholder="Confirm Password" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #4285f4; background: #000; color: #0f0; box-sizing: border-box;">
            <button onclick="signup()" style="width: 100%; background:#34a853; color:#fff; border:none; padding:8px; cursor:pointer; border-radius:4px; font-weight:bold; margin-bottom: 10px;">Sign Up</button>
            <button onclick="showLogin()" style="width: 100%; background:#666; color:#fff; border:none; padding:8px; cursor:pointer; border-radius:4px;">Back to Login</button>
        </div>
        
        <!-- Logged In View -->
        <div id="userInfo" style="color: #4285f4; font-family: monospace; display: none; text-align: center;">
            <div style="margin-bottom: 10px; color: #34a853; font-weight: bold; font-size: 16px;"><span id="userName"></span></div>
            <button onclick="logout()" style="width: 100%; background:#ea4335; color:#fff; border:none; padding:8px; cursor:pointer; border-radius:4px; font-weight:bold;">Logout</button>
        </div>
    </div>
    <div id="controls">
        <button onclick="changeShape('cube')">Cube</button>
        <button onclick="changeShape('sphere')">Sphere</button>
        <button onclick="changeShape('torus')">Torus</button>
        <button onclick="changeShape('cone')">Cone</button>
        <button onclick="changeShape('octahedron')">Octahedron</button>
        <button onclick="showCity()" style="background: #ff6600; margin-left: 20px;">🏙️ City (10s)</button>
        <button onclick="toggleSettings()" style="background:#888; margin-left:20px;">⚙️ Settings</button>
    </div>
    <!-- Hidden audio element for background music -->
    <audio id="bgMusic" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_35b3c9bf3b.mp3?filename=neon-10985.mp3" loop crossorigin="anonymous" preload="auto"></audio>
    <!-- Sun power slider (visible only in city mode) -->
    <div id="sunControl" style="position:absolute; bottom:70px; left:50%; transform:translateX(-50%); display:none; z-index:100; background:rgba(0,0,0,0.7); padding:8px; border:1px solid #0f0; border-radius:4px;">
        <label style="color:#0f0; font-family:monospace; font-size:12px;">
            Sun power <input id="sunSlider" type="range" min="0" max="1" step="0.01" value="0.12" style="vertical-align:middle;">
        </label>
    </div>
    <!-- Settings panel -->
    <div id="settingsPanel" style="position:absolute; top:50px; right:10px; background:rgba(0,0,0,0.9); color:#0f0; padding:15px; border:2px solid #0f0; border-radius:8px; display:none; z-index:100; font-family:monospace;">
        <div><label><input type="checkbox" id="fogCheckbox" checked onchange="updateFog()"> Fog</label></div>
        <div style="margin-top:8px;"><label>Density:<br>
            <select id="densitySelect" onchange="changeDensity(this.value)">
                <option value="high">High</option>
                <option value="low">Low</option>
            </select>
        </label></div>
        <div style="margin-top:8px;"><label><input type="checkbox" id="musicCheckbox" onchange="toggleMusic()"> Music</label></div>
        <div style="margin-top:4px;"><label>Volume: <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.5" onchange="changeVolume(this.value)"></label></div>
        <div style="margin-top:8px;"><label><input type="checkbox" id="statsCheckbox" checked onchange="toggleStats()"> Show Stats</label></div>
        <div style="margin-top:8px;"><label>Sun Light:<br>
            <input id="sunLightSlider" type="range" min="0" max="2" step="0.1" value="1" onchange="changeSunLight(this.value)" style="width:100%;">
        </label></div>
        <div style="margin-top:8px;"><button onclick="resetCamera()" style="background:#0f0;color:#000;border:none;padding:4px 8px;cursor:pointer;">Reset Camera</button></div>
    </div>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

    <script>
        let isLoggedIn = false;
        let currentUser = null;

        // Load users from localStorage
        function getUsers() {
            const users = localStorage.getItem('appUsers');
            return users ? JSON.parse(users) : {};
        }

        // Save users to localStorage
        function saveUsers(users) {
            localStorage.setItem('appUsers', JSON.stringify(users));
        }

        // Show signup form
        function showSignup() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
        }

        // Show login form
        function showLogin() {
            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }

        // Create new account
        function signup() {
            const username = document.getElementById('signupUser').value.trim();
            const password = document.getElementById('signupPass').value;
            const password2 = document.getElementById('signupPass2').value;

            if (!username || !password) {
                alert('Username and password required!');
                return;
            }

            if (password !== password2) {
                alert('Passwords do not match!');
                return;
            }

            const users = getUsers();
            if (users[username]) {
                alert('Username already exists!');
                return;
            }

            users[username] = password;
            saveUsers(users);
            alert('Account created! Now you can login.');
            showLogin();
            document.getElementById('loginUser').value = username;
            document.getElementById('loginPass').value = '';
        }

        // Login
        function login() {
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value;

            if (!username || !password) {
                alert('Enter username and password!');
                return;
            }

            const users = getUsers();
            if (!users[username]) {
                alert('User not found!');
                return;
            }

            if (users[username] !== password) {
                alert('Wrong password!');
                return;
            }

            isLoggedIn = true;
            currentUser = username;
            document.getElementById('userName').textContent = currentUser;
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('userInfo').style.display = 'block';
            console.log('Logged in as:', currentUser);
        }

        // Logout
        function logout() {
            isLoggedIn = false;
            currentUser = null;
            document.getElementById('loginUser').value = '';
            document.getElementById('loginPass').value = '';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('userInfo').style.display = 'none';
        }

        // Check if user was already logged in
        window.addEventListener('load', function() {
            const saved = sessionStorage.getItem('currentUser');
            if (saved) {
                isLoggedIn = true;
                currentUser = saved;
                document.getElementById('userName').textContent = currentUser;
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('userInfo').style.display = 'block';
            }
        });

        // Save user on login
        const originalLogin = login;
        function login() {
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value;

            if (!username || !password) {
                alert('Enter username and password!');
                return;
            }

            const users = getUsers();
            if (!users[username]) {
                alert('User not found!');
                return;
            }

            if (users[username] !== password) {
                alert('Wrong password!');
                return;
            }

            isLoggedIn = true;
            currentUser = username;
            sessionStorage.setItem('currentUser', currentUser);
            document.getElementById('userName').textContent = currentUser;
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('userInfo').style.display = 'block';
            console.log('Logged in as:', currentUser);
        }
    </script>

    <script>
        const THREE = window.THREE;

        // Web Audio API for procedural music
        let audioContext = null;
        let musicOscillators = [];
        let musicGain = null;

        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function createProceduralMusic() {
            initAudioContext();
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            
            // Create master gain
            if (!musicGain) {
                musicGain = audioContext.createGain();
                musicGain.connect(audioContext.destination);
                musicGain.gain.value = settings.volume * 0.25; // soft ambient
            }
            
            // Stop old oscillators
            musicOscillators.forEach(osc => {
                try { osc.stop(); } catch(e) {}
            });
            musicOscillators = [];
            
            // Chill deep notes: low A minor pentatonic (relaxing, meditative)
            const chillNotes = [55, 82, 110, 147, 165, 220, 247]; // A1, A#1, A2, D2, E2, A3, B3
            
            // Create slow, sustained ambient layers
            for (let i = 0; i < 4; i++) {
                setTimeout(() => {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    
                    osc.type = i % 2 === 0 ? 'sine' : 'triangle';
                    osc.frequency.value = chillNotes[Math.floor(Math.random() * chillNotes.length)];
                    
                    // Very long, smooth fade-in and fade-out for chill vibe
                    gain.gain.setValueAtTime(0, audioContext.currentTime);
                    gain.gain.linearRampToValueAtTime(0.12, audioContext.currentTime + 2);  // slow attack
                    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 11); // long decay
                    
                    osc.connect(gain);
                    gain.connect(musicGain);
                    osc.start();
                    osc.stop(audioContext.currentTime + 11);
                    
                    musicOscillators.push(osc);
                }, i * 2500); // slower spacing = more spaced-out, chill feel
            }
            
            // Loop every 30 seconds (longer = more relaxed)
            setTimeout(createProceduralMusic, 30000);
        }

        function stopProceduralMusic() {
            musicOscillators.forEach(osc => {
                try { osc.stop(); } catch(e) {}
            });
            musicOscillators = [];
        }
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. A Kocka létrehozása (Geometria + Anyag)
        let currentObject = null;
        let currentMaterial = null;

        // Define materials for each shape
        const materials = {
            cube: new THREE.MeshStandardMaterial({ 
                color: 0x00ffcc,
                emissive: 0xff00ff,
                emissiveIntensity: 1,
                wireframe: true
            }),
            sphere: new THREE.MeshStandardMaterial({ 
                color: 0xffff00,
                emissive: 0x00ff00,
                emissiveIntensity: 0.8,
                wireframe: true
            }),
            torus: new THREE.MeshStandardMaterial({ 
                color: 0xff0088,
                emissive: 0x00ffff,
                emissiveIntensity: 0.8,
                wireframe: true
            }),
            cone: new THREE.MeshStandardMaterial({ 
                color: 0xff6600,
                emissive: 0xff0000,
                emissiveIntensity: 0.8,
                wireframe: true
            }),
            octahedron: new THREE.MeshStandardMaterial({ 
                color: 0x00ff88,
                emissive: 0xff00ff,
                emissiveIntensity: 0.8,
                wireframe: true
            })
        };

        function changeShape(shape) {
            // Remove current object
            if (currentObject) {
                scene.remove(currentObject);
            }

            // Create new object with minimal segments (few lines)
            let geometry;
            switch(shape) {
                case 'cube':
                    geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
                    break;
                case 'sphere':
                    geometry = new THREE.SphereGeometry(0.8, 4, 4);
                    break;
                case 'torus':
                    geometry = new THREE.TorusGeometry(1, 0.4, 4, 8);
                    break;
                case 'cone':
                    geometry = new THREE.ConeGeometry(0.8, 2, 4);
                    break;
                case 'octahedron':
                    geometry = new THREE.OctahedronGeometry(0.8, 0);
                    break;
            }

            currentMaterial = materials[shape];
            currentObject = new THREE.Mesh(geometry, currentMaterial);
            currentObject.position.set(0, 0, 0);
            scene.add(currentObject);
        }

        // Start with cube
        changeShape('cube');

        // 3. Fények (hogy ne legyen tök sötét)
        const light = new THREE.PointLight(0xffffff, 10, 100);
        light.position.set(10, 10, 10);
        scene.add(light);
        camera.position.z = 6;

        // Stats tracking
        let frameCount = 0;
        let lastTime = Date.now();
        let renderTime = 0;
        
        // City mode variables (also used for orbiting shapes)
        let cityMode = false;
        let cityCars = [];
        let cityTimeout = null;
        let citySunMesh = null; // global reference to sun sphere
        let citySunLight = null; // global reference to sun light
        let cityDecorations = []; // rotating sculptures/orbs
        let cityGlitter = []; // twinkling glitter particles
        let cityConfetti = []; // falling confetti particles
        // settings state
        let settings = {
            fog: true,
            density: 'high',
            music: false,
            volume: 0.5,
            showStats: true
        };
        // apply initial stats visibility now that settings exists
        document.getElementById('stats').style.display = settings.showStats ? 'block' : 'none';

        // Orbit control state (works in both city and shape mode)
        let cameraDistance = 6;
        let mouseDown = false;
        let mouseX = 0;
        let mouseY = 0;
        let rotX = 0; // vertical rotation
        let rotY = 0; // horizontal rotation

        // Pointer handlers - enable orbit on drag anywhere
        document.addEventListener('mousedown', (e) => {
            mouseDown = true;
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        document.addEventListener('mousemove', (e) => {
            if (!mouseDown) return;
            const deltaX = e.clientX - mouseX;
            const deltaY = e.clientY - mouseY;
            rotY += deltaX * 0.005;
            rotX += deltaY * 0.005;
            rotX = Math.max(-Math.PI / 2 + 0.1, Math.min(Math.PI / 2 - 0.1, rotX));
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        document.addEventListener('mouseup', () => { mouseDown = false; });
        document.addEventListener('mouseleave', () => { mouseDown = false; });

        // Wheel zoom (works in both modes)
        document.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomDelta = e.deltaY > 0 ? 0.5 : -0.5;
            cameraDistance = Math.max(2, Math.min(30, cameraDistance + zoomDelta));
        }, { passive: false });

        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            if (panel.style.display === 'block') {
                panel.style.display = 'none';
            } else {
                // sync controls
                document.getElementById('fogCheckbox').checked = settings.fog;
                document.getElementById('densitySelect').value = settings.density;
                document.getElementById('musicCheckbox').checked = settings.music;
                document.getElementById('statsCheckbox').checked = settings.showStats;
                panel.style.display = 'block';
            }
        }

        function updateFog() {
            settings.fog = document.getElementById('fogCheckbox').checked;
            if (cityMode) {
                scene.fog = settings.fog ? new THREE.FogExp2(0x000000, 0.0025) : null;
            }
        }

        function changeDensity(val) {
            settings.density = val;
        }

        function toggleMusic() {
            settings.music = document.getElementById('musicCheckbox').checked;
            const audio = document.getElementById('bgMusic');
            if (settings.music) {
                initAudioContext();
                createProceduralMusic();
                audio.volume = settings.volume;
                audio.play().catch(err => {
                    console.log('play blocked', err);
                });
            } else {
                stopProceduralMusic();
                audio.pause();
            }
        }

        function changeVolume(v) {
            settings.volume = parseFloat(v);
            const audio = document.getElementById('bgMusic');
            audio.volume = settings.volume;
            if (musicGain) {
                musicGain.gain.value = settings.volume * 0.3;
            }
        }

        function changeSunLight(val) {
            if (citySunLight) {
                citySunLight.intensity = parseFloat(val) * 0.5;
            }
        }

        // unlock audio on first user interaction
        document.addEventListener('click', () => {
            const audio = document.getElementById('bgMusic');
            if (settings.music && audio.paused) {
                audio.play().catch(err => console.log('unlock play failed', err));
            }
        }, { once: true });

        function toggleStats() {
            settings.showStats = document.getElementById('statsCheckbox').checked;
            document.getElementById('stats').style.display = settings.showStats ? 'block' : 'none';
        }

        function resetCamera() {
            rotX = 0; rotY = 0; cameraDistance = 6;
            camera.position.set(0, 0, cameraDistance);
            camera.lookAt(0, 0, 0);
        }
        function showCity() {
            // Clear current objects
            if (currentObject) {
                scene.remove(currentObject);
            }
            
            cityMode = true;
            cityCars = [];
            
            // Set background to dark for glow effect
            scene.background = new THREE.Color(0x000000);
            // Add subtle fog for depth if enabled
            scene.fog = settings.fog ? new THREE.FogExp2(0x000000, 0.0025) : null;
            
            // Clear previous city objects
            const objectsToRemove = [];
            scene.children.forEach(obj => {
                if (obj.userData.isCity) {
                    objectsToRemove.push(obj);
                }
            });
            objectsToRemove.forEach(obj => scene.remove(obj));
            
            // Remove old lights
            const oldLights = [];
            scene.children.forEach(obj => {
                if (obj instanceof THREE.Light) {
                    oldLights.push(obj);
                }
            });
            oldLights.forEach(light => scene.remove(light));
            
            // Add bright ambient light for neon glow
            const ambientLight = new THREE.AmbientLight(0xFFFFFF, 0.45);
            ambientLight.userData.isCity = true;
            scene.add(ambientLight);

            // Add directional rim light
            const sun = new THREE.DirectionalLight(0xffffff, 0.35);
            sun.position.set(-10, 20, 10);
            sun.userData.isCity = true;
            scene.add(sun);
 
            // helper neon material creator
            const createNeonMaterial = (color) => {
                return new THREE.MeshStandardMaterial({
                    color: color,
                    emissive: color,
                    emissiveIntensity: 2,
                    wireframe: true,
                    linewidth: 3,
                    transparent: true,
                    opacity: 0.95
                });
            };
 
            // Big faint sun sphere high above the scene
            const sunGeo = new THREE.SphereGeometry(15, 32, 32);
            const sunMat = new THREE.MeshBasicMaterial({
                color: 0xffdd66,
                emissive: 0xffdd66,
                emissiveIntensity: 0.8,
                transparent: true,
                opacity: 0.12,
                depthWrite: false
            });
            const sunMeshLocal = new THREE.Mesh(sunGeo, sunMat);
            citySunMesh = sunMeshLocal; // keep global reference
            sunMeshLocal.position.set(0, 40, -5);
            sunMeshLocal.userData.isCity = true;
            // Add sun light (emanates from the sun sphere)
            if (citySunLight) scene.remove(citySunLight);
            citySunLight = new THREE.PointLight(0xffdd66, 1, 100);
            citySunLight.position.set(0, 40, -5);
            citySunLight.userData.isCity = true;
            scene.add(citySunLight);
            const controlDiv = document.getElementById('sunControl');
            controlDiv.style.display = 'block';
            const slider = document.getElementById('sunSlider');
            slider.value = 0.12;
            slider.oninput = function() {
                if (citySunMesh) {
                    citySunMesh.material.opacity = parseFloat(this.value);
                    citySunMesh.material.emissiveIntensity = parseFloat(this.value) * 8;
                }
            };

            // Create a solid metallic material for variety (no wireframe)
            const createMetalMaterial = (color) => {
                return new THREE.MeshStandardMaterial({
                    color: color,
                    emissive: 0x000000,
                    emissiveIntensity: 0.05,
                    metalness: 0.95,
                    roughness: 0.15,
                    wireframe: false,
                    reflectivity: 1
                });
            };
            
            // Glowing wireframe buildings
            const neonColors = [0xFF00FF, 0x00FFFF, 0x00FF00, 0xFF0000, 0xFFFF00, 0xFF00FF];
            let colorIndex = 0;
            
            // Create building grid based on density setting
            const start = settings.density === 'high' ? -12 : -6;
            const end = settings.density === 'high' ? 12 : 6;
            const step = settings.density === 'high' ? 0.6 : 1.2;
            for (let i = start; i <= end; i += step) {
                for (let j = start; j <= end; j += step) {
                    // leave a small central plaza
                    if (Math.abs(i) < 1.2 && Math.abs(j) < 1.2) continue;
                    const height = 1 + Math.random() * 7.0; // taller buildings
                    const bw = 0.5 + Math.random() * 0.6;
                    const bd = 0.5 + Math.random() * 0.6;
                    const buildingGeo = new THREE.BoxGeometry(bw, height, bd);
                    const color = neonColors[colorIndex % neonColors.length];
                    // Randomly make some buildings solid metallic (about 20%)
                    const makeMetal = Math.random() < 0.22;
                    const buildingMat = makeMetal ? createMetalMaterial(color) : createNeonMaterial(color);
                    const building = new THREE.Mesh(buildingGeo, buildingMat);
                    building.position.set(i, height / 2, j);
                    building.userData.isCity = true;
                    building.userData.neonColor = color;
                    scene.add(building);
                    colorIndex++;
                }
            }
            
            // Glowing wireframe cars
            // Create many cars across multiple lanes
            const lanes = [-1.6, -0.8, 0, 0.8, 1.6];
            for (let i = 0; i < 30; i++) {
                const carGeo = new THREE.BoxGeometry(0.5, 0.22, 0.2);
                const carColor = neonColors[i % neonColors.length];
                const carMat = createNeonMaterial(carColor);
                const car = new THREE.Mesh(carGeo, carMat);
                const lane = lanes[i % lanes.length];
                car.position.set(-20 + Math.random() * 40, 0.12, lane + (Math.random() - 0.5) * 0.2);
                car.userData.isCity = true;
                car.userData.speed = 0.06 + Math.random() * 0.18;
                car.userData.neonColor = carColor;
                scene.add(car);
                cityCars.push(car);
            }
            
            // Glowing wireframe people (octahedrons)
            // More pedestrians
            for (let p = 0; p < 80; p++) {
                const personGeo = new THREE.OctahedronGeometry(0.16 + Math.random() * 0.12, 0);
                const personColor = neonColors[p % neonColors.length];
                const personMat = createNeonMaterial(personColor);
                const person = new THREE.Mesh(personGeo, personMat);
                person.position.set((Math.random() - 0.5) * 20, 0.12, (Math.random() - 0.5) * 18);
                person.userData.isCity = true;
                person.userData.walkSpeed = 0.005 + Math.random() * 0.03;
                person.userData.walkDir = Math.random() > 0.5 ? 1 : -1;
                person.userData.neonColor = personColor;
                scene.add(person);
            }
            
            // Glowing lines (ground grid) - bigger
            const gridGeo = new THREE.BufferGeometry();
            const gridPoints = [];
            for (let i = -30; i <= 30; i += 0.5) {
                gridPoints.push(i, -0.05, -30);
                gridPoints.push(i, -0.05, 30);
                gridPoints.push(-30, -0.05, i);
                gridPoints.push(30, -0.05, i);
            }
            gridGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(gridPoints), 3));
            const gridMat = new THREE.LineBasicMaterial({ color: 0x00FF66, linewidth: 1 });
            const gridLines = new THREE.LineSegments(gridGeo, gridMat);
            gridLines.userData.isCity = true;
            scene.add(gridLines);

            // Create wide neon avenues (big roads)
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x050506, metalness: 0.15, roughness: 0.9 });
            const avenueX = new THREE.Mesh(new THREE.BoxGeometry(60, 0.02, 10), roadMat);
            avenueX.position.set(0, 0.01, 0);
            avenueX.userData.isCity = true;
            scene.add(avenueX);

            const avenueZ = new THREE.Mesh(new THREE.BoxGeometry(10, 0.02, 60), roadMat);
            avenueZ.position.set(0, 0.01, 0);
            avenueZ.userData.isCity = true;
            scene.add(avenueZ);

            // Neon edge strips for avenues
            const edgeColors = [0x00FFFF, 0xFF00FF, 0x00FF66];
            for (let side = -1; side <= 1; side += 2) {
                const edgeMat = createNeonMaterial(edgeColors[(side + 1) % edgeColors.length]);
                const edgeX = new THREE.Mesh(new THREE.BoxGeometry(60, 0.03, 0.12), edgeMat);
                edgeX.position.set(0, 0.02, side * 5.12);
                edgeX.userData.isCity = true;
                scene.add(edgeX);

                const edgeZ = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.03, 60), edgeMat);
                edgeZ.position.set(side * 5.12, 0.02, 0);
                edgeZ.userData.isCity = true;
                scene.add(edgeZ);
            }

            // Lane markers (dashed lines) along the main avenue
            const markerMat = new THREE.MeshStandardMaterial({ color: 0xFFFF88, emissive: 0xFFFF88, emissiveIntensity: 2, metalness: 0, roughness: 0.6 });
            for (let i = -28; i <= 28; i += 1.6) {
                const m = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.01, 0.18), markerMat);
                m.position.set(i, 0.03, 0);
                m.userData.isCity = true;
                scene.add(m);
            }

            // Secondary lane markers for cross avenue
            for (let i = -28; i <= 28; i += 1.6) {
                const m2 = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.01, 0.8), markerMat);
                m2.position.set(0, 0.03, i);
                m2.userData.isCity = true;
                scene.add(m2);
            }

            // Create glitter (twinkling light particles)
            const glitterColors = [0xFFFFFF, 0xFF00FF, 0x00FFFF, 0xFFFF00, 0xFF6600];
            for (let g = 0; g < 200; g++) {
                const glitterGeo = new THREE.SphereGeometry(0.05, 4, 4);
                const glitterMat = new THREE.MeshBasicMaterial({ color: glitterColors[g % glitterColors.length], transparent: true });
                const glitter = new THREE.Mesh(glitterGeo, glitterMat);
                glitter.position.set(
                    (Math.random() - 0.5) * 30,
                    Math.random() * 15 + 2,
                    (Math.random() - 0.5) * 30
                );
                glitter.userData.isCity = true;
                glitter.userData.twinklePhase = Math.random() * Math.PI * 2;
                glitter.userData.twinkleSpeed = 0.05 + Math.random() * 0.1;
                scene.add(glitter);
                cityGlitter.push(glitter);
            }
            
            // Create confetti (falling paper-like particles)
            const confettiColors = [0xFF0000, 0x00FF00, 0x0000FF, 0xFFFF00, 0xFF00FF, 0x00FFFF];
            for (let c = 0; c < 150; c++) {
                const confettiGeo = new THREE.BoxGeometry(0.1, 0.15, 0.02);
                const confettiMat = new THREE.MeshStandardMaterial({ 
                    color: confettiColors[c % confettiColors.length],
                    emissive: confettiColors[c % confettiColors.length],
                    emissiveIntensity: 0.5,
                    metalness: 0.8,
                    roughness: 0.2
                });
                const confetti = new THREE.Mesh(confettiGeo, confettiMat);
                confetti.position.set(
                    (Math.random() - 0.5) * 25,
                    Math.random() * 20 + 5,
                    (Math.random() - 0.5) * 25
                );
                confetti.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                confetti.userData.isCity = true;
                confetti.userData.fallSpeed = 0.01 + Math.random() * 0.04;
                confetti.userData.swayX = (Math.random() - 0.5) * 0.02;
                confetti.userData.swayZ = (Math.random() - 0.5) * 0.02;
                scene.add(confetti);
                cityConfetti.push(confetti);
            }
            
            // Set camera further back for big city
            cameraDistance = 20;
            rotX = -0.25;
            rotY = 0;
            const cx = cameraDistance * Math.cos(rotY) * Math.cos(rotX);
            const cy = cameraDistance * Math.sin(rotX);
            const cz = cameraDistance * Math.sin(rotY) * Math.cos(rotX);
            camera.position.set(cx, cy, cz);
            camera.lookAt(0, 0.5, 0);
            
            // add central sculpture and floating orbs
            const sculptureGroup = new THREE.Group();
            sculptureGroup.userData.isCity = true;
            // vertical pole
            const pole = new THREE.Mesh(
                new THREE.CylinderGeometry(0.1, 0.1, 4, 12),
                new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x5555ff, emissiveIntensity: 1, metalness: 0.7, roughness: 0.2 })
            );
            sculptureGroup.add(pole);
            // rotating rings
            for (let r = 1; r <= 3; r++) {
                const ring = new THREE.Mesh(
                    new THREE.TorusGeometry(r, 0.03, 8, 16),
                    new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 2, wireframe: true, transparent: true, opacity: 0.9 })
                );
                ring.rotation.x = Math.PI / 2;
                ring.userData.spinSpeed = 0.005 + r * 0.003;
                sculptureGroup.add(ring);
            }
            sculptureGroup.position.set(0, 2, 0);
            scene.add(sculptureGroup);
            cityDecorations.push(sculptureGroup);

            // Set timeout
            if (cityTimeout) clearTimeout(cityTimeout);
            cityTimeout = setTimeout(() => {
                endCity();
            }, 10000);
            // if music is enabled, start audio (in case it was paused)
            if (settings.music) {
                const audio = document.getElementById('bgMusic');
                audio.volume = settings.volume;
                audio.play().catch(() => {});
            }
        }
        
        function endCity() {
            cityMode = false;
                        // Hide sun slider
                        document.getElementById('sunControl').style.display = 'none';
                        citySunMesh = null;
                        // Reset orbit rotation and distance
                        rotX = 0;
                        rotY = 0;
                        cameraDistance = 6;
            
            
            // Remove city objects
            const objectsToRemove = [];
            scene.children.forEach(obj => {
                if (obj.userData.isCity) {
                    objectsToRemove.push(obj);
                }
            });
            objectsToRemove.forEach(obj => scene.remove(obj));
            
            cityCars = [];
            cityDecorations = [];
            cityGlitter = [];
            cityConfetti = [];
            
            // Reset background to dark
            scene.background = new THREE.Color(0x111111);
            
            // Reset camera
            camera.position.z = 6;
            camera.fov = 75;
            camera.updateProjectionMatrix();
            
            // Re-add default light
            const light = new THREE.PointLight(0xffffff, 10, 100);
            light.position.set(10, 10, 10);
            scene.add(light);
            
            // Show shape again
            changeShape('cube');
        }
        
        function updateStats() {
            const now = Date.now();
            const elapsed = now - lastTime;
            
            if (elapsed >= 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                lastTime = now;
            }
            
            if (performance.memory) {
                const usedMemory = Math.round(performance.memory.usedJSHeapSize / 1048576);
                document.getElementById('memory').textContent = usedMemory;
            }
            
            document.getElementById('render').textContent = renderTime.toFixed(2);
        }

        // 4. Animációs ciklus (itt történik a varázslat)
        function animate() {
            requestAnimationFrame(animate);
            
            // Render time measurement
            const renderStart = performance.now();
            
            // RGB szín animáció
            const time = Date.now() * 0.001;
            const r = Math.sin(time) * 0.5 + 0.5;
            const g = Math.sin(time + 2) * 0.5 + 0.5;
            const b = Math.sin(time + 4) * 0.5 + 0.5;
            
            // Handle city mode or shape mode
            if (cityMode) {
                // Camera for city mode (rotations + distance)
                const dist = cameraDistance;
                const cx = dist * Math.cos(rotY) * Math.cos(rotX);
                const cy = dist * Math.sin(rotX);
                const cz = dist * Math.sin(rotY) * Math.cos(rotX);
                camera.position.set(cx, cy, cz);
                camera.lookAt(0, 0.5, 0);

                // Animate cars
                cityCars.forEach(car => {
                    car.position.x += car.userData.speed;
                    if (car.position.x > 8) car.position.x = -8;
                    // Neon pulse
                    const pulseTime = Date.now() * 0.003;
                    const intensity = 1 + Math.sin(pulseTime) * 0.6;
                    if (car.material) car.material.emissiveIntensity = intensity * 1.5;
                });

                // Animate decorative sculpture rings
                cityDecorations.forEach(group => {
                    group.children.forEach(child => {
                        if (child.userData.spinSpeed) {
                            child.rotation.z += child.userData.spinSpeed;
                        }
                    });
                });

                // Animate glitter (twinkling)
                cityGlitter.forEach(glitter => {
                    glitter.userData.twinklePhase += glitter.userData.twinkleSpeed;
                    const twinkleFactor = Math.sin(glitter.userData.twinklePhase) * 0.5 + 0.5;
                    glitter.material.opacity = twinkleFactor;
                });

                // Animate confetti (falling and swaying)
                cityConfetti.forEach(confetti => {
                    confetti.position.y -= confetti.userData.fallSpeed;
                    confetti.position.x += confetti.userData.swayX * Math.sin(Date.now() * 0.001);
                    confetti.position.z += confetti.userData.swayZ * Math.cos(Date.now() * 0.001);
                    confetti.rotation.x += 0.02;
                    confetti.rotation.y += 0.03;
                    confetti.rotation.z += 0.015;
                    
                    // Reset position if fallen below ground
                    if (confetti.position.y < -1) {
                        confetti.position.y = 20 + Math.random() * 5;
                        confetti.position.x = (Math.random() - 0.5) * 25;
                        confetti.position.z = (Math.random() - 0.5) * 25;
                    }
                });

                // Animate people walking and glowing
                scene.children.forEach(obj => {
                    if (obj.userData.walkSpeed) {
                        obj.position.x += obj.userData.walkSpeed * obj.userData.walkDir;
                        if (obj.position.x > 6 || obj.position.x < -6) obj.userData.walkDir *= -1;
                        const pulseTime = Date.now() * 0.003;
                        const intensity = 1 + Math.sin(pulseTime) * 0.5;
                        if (obj.material) obj.material.emissiveIntensity = intensity * 1.5;
                    }
                });

                // Update building glow
                scene.children.forEach(obj => {
                    if (obj.userData.isCity && obj.userData.neonColor && obj.geometry && obj.geometry.type === 'BoxGeometry') {
                        const pulseTime = Date.now() * 0.002;
                        const intensity = 1.5 + Math.sin(pulseTime) * 0.8;
                        if (obj.material) obj.material.emissiveIntensity = intensity;
                    }
                });
            } else {
                // Animate current object
                if (currentObject) {
                    currentObject.rotation.x += 0.01;
                    currentObject.rotation.y += 0.01;
                    currentMaterial.emissive.setRGB(r, g, b);
                    currentMaterial.color.setRGB(r * 0.5, g * 0.5, b * 0.5);
                }

                // Shape mode camera orbit
                const dist2 = cameraDistance;
                const sx = dist2 * Math.cos(rotY) * Math.cos(rotX);
                const sy = dist2 * Math.sin(rotX);
                const sz = dist2 * Math.sin(rotY) * Math.cos(rotX);
                camera.position.set(sx, sy, sz);
                camera.lookAt(0, 0, 0);
            }

            renderer.render(scene, camera);

            renderTime = performance.now() - renderStart;
            frameCount++;
            updateStats();
        }
        animate();

        // Ablak átméretezés kezelése
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
